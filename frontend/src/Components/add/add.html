<div class="page-wrapper">
  <div class="card">

    <div class="card-header">
      <h2>{{headingText()}}</h2>
    </div>

    <form class="employee-form" [formGroup]="addUserForm" (ngSubmit)="handleAddSubmit()">

      <div class="form-group">
        <label>Employee Name</label>
        <input type="text" placeholder="Enter employee name" formControlName="employeeName">
      </div>

      <div class="form-group">
        <label>Employee Role</label>
        <input type="text" placeholder="Enter employee role" formControlName="employeeRole">
      </div>

      <div class="form-group">
        <label>Employee Gender</label>
        <select formControlName="employeeGender">
          <option value="">Select gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Employee Salary</label>
        <input type="number" placeholder="Enter salary" formControlName="employeeSalary">
      </div>

      <div class="form-group">
        <label>Employee DOB</label>
        <input type="date" formControlName="employeeDob">
      </div>

      <div class="form-group">
        <label>Employee Phone Number</label>
        <input type="tel" placeholder="Enter phone number" formControlName="employeePhno">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">{{headingText()}}</button>
      </div>

    </form>

  </div>
</div>
